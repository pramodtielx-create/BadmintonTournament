<!DOCTYPE html>
<html lang="en">
<head>

  <title>Badminton Tournament Intelligence</title>

  <!-- ===== Chart.js ===== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">

    <!-- ================= CONTENT ================= -->
    <main id="main-content" class="content">
      <h2>Welcome</h2>
      <p>Select a section from the left menu.</p>

  <script src="js/app.js"></script>
